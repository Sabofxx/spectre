# Spectre — référentiel des sources
# Orientations: extrême-gauche | gauche | centre-gauche | centre | centre-droit | droite | extrême-droite
# Editorial style: factuel | mixte | opinion
# La classification est indicative et débattable (voir README).
# Propriétaires d'après la carte "Médias français, qui possède quoi"
# (Le Monde diplomatique / Acrimed, éd. 2024).
# Tous les flux ont été vérifiés par fetch réel le 2026-07-11.

classification:
  reviewed_at: "2026-07-11"
  scope: source-level
  basis: "Positionnement éditorial public, propriétaires et dominante du flux RSS suivi ; ne qualifie jamais un article isolé."

